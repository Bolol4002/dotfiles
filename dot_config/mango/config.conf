# More option see https://github.com/DreamMaoMao/mango/wiki/
# autostart
exec-once=bash ~/.config/mango/autostart.sh

# Layout keybinds (keep as default)
bind = SUPER, g, setlayout, grid
bind=SUPER+SHIFT,s,spawn,/home/sayooj/.config/mango/scripts/snip
bind = SUPER, t, setlayout, tile
bind = SUPER, s, setlayout, scroller

# Terminal & Apps
bind=SUPER,RETURN,spawn,ghostty
bind=SUPER,e,spawn,emacs
bind=SUPER,f,spawn,ghostty -e ranger
bind=SUPER+SHIFT,RETURN,spawn,rofi -show drun
bind=SUPER+SHIFT,g,togglegaps
bind=ALT,space,spawn,librewolf
# Kill focused window
bind=SUPER,q,killclient
# Quit mango
bind=SUPER+SHIFT,q,quit
# Reload config
bind=SUPER+SHIFT,r,reload_config
# Floating toggle
bind=SUPER+V,togglefloating
# Focus stacking
bind=SUPER+J,focusstack,next
bind=SUPER+K,focusstack,prev 
# Focus direction (vim keys)
bind=SUPER,h,focusdir,left
bind=SUPER+j,focusdir,down
bind=SUPER+k,focusdir,up
bind=SUPER+l,focusdir,right
# Focus direction (Arrow Keys)
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down

# Move/Swap window (vim keys + Shift)
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# Move/Swap window (SUPER + SHIFT + Arrows)
bind=SUPER+SHIFT,left,exchange_client,left
bind=Super+shift, right,exchange_client,right
bind=SUPER+SHIFT,up,exchange_client,up
bind=SUPER+SHIFT,down,exchange_client,down

# Switch Tags (SUPER + 1-9)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Move window to Tag (SUPER + SHIFT + 1-9)
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Move window to Tag silently (SUPER + ALT + 1-9)
bind=SUPER+ALT,1,tagsilent,1,0
bind=SUPER+ALT,2,tagsilent,2,0
bind=SUPER+ALT,3,tagsilent,3,0
bind=SUPER+ALT,4,tagsilent,4,0
bind=SUPER+ALT,5,tagsilent,5,0
bind=SUPER+ALT,6,tagsilent,6,0
bind=SUPER+ALT,7,tagsilent,7,0
bind=SUPER+ALT,8,tagsilent,8,0
bind=SUPER+ALT,9,tagsilent,9,0

# SUPER + Left Mouse to Drag, SUPER + Right Mouse to Resize
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

#gesture
# 3-finger swipe to move focus
gesturebind=none,left,3,focusdir,right
gesturebind=none,right,3,focusdir,left

# 4-finger swipe to switch workspace
gesturebind=none,up,4,toggleoverview
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,right,4,viewtoleft_have_client

# Brightness and Volume keys (from sway - XF86 media keys)
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set +5%
bind=NONE,XF86AudioMute,spawn,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind=NONE,XF86AudioLowerVolume,spawn,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=NONE,XF86AudioRaiseVolume,spawn,pactl set-sink-volume @DEFAULT_SINK@ +5%

# Screenshot with grim (from sway)
# bind=NONE,Print,exec,sh -c 'FILE=~/screenshots/$(date +%s).png; grim -g "$(slurp)" "$FILE" && wl-copy --type image/png < "$FILE"'
bind=NONE,Print,exec,sh -c 'grim -g "$(slurp)" - | tee ~/screenshots/$(date +%s).png | wl-copy --type image/png'
# Scratchpad
bind=SUPER+SHIFT,minus,move_scratchpad
bind=SUPER,minus,scratchpad_show

# Fullscreen
bind=SUPER+SHIFT,f,fullscreen

# Layout toggle split
bind=SUPER+e,layout_toggle_split

# Focus parent
bind=SUPER,a,focus_parent

# Mode toggle (tiling/floating)
bind=SUPER,space,focus_mode_toggle

# Alt keybinds (from sway Mod1)
bind=ALT,e,spawn,emacs
bind=ALT,space,spawn,librewolf
bind=ALT,f,spawn,ghostty -e ranger
bind=ALT,l,exec,ghostty -e swaylock -f -c 000000
#bind = MOD1, L, exec, swaylock -f -c 000000
bind=ALT,n,spawn,ghostty -e nmtui
bind=ALT,v,spawn,ghostty -e alsamixer

trackpad_natural_scrolling=1
